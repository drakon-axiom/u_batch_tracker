server {
    listen 80;
    server_name batch-tracker.internal;  # Replace with your server hostname or IP

    # Serve Next.js static assets directly from disk (bypass Node.js)
    location /_next/static/ {
        alias /opt/batch-tracker/current/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /public/ {
        alias /opt/batch-tracker/current/public/;
        expires 7d;
    }

    # Everything else → Next.js app
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
